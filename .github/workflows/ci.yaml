name: AWS Deployment

on: 
  push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repro
        uses: actions/checkout@v3
      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: 3.11
      - name: install dependesi
        run: |
          pip install -r requirements.txt --cache-dir ~/.pip-cache

      - name: Login to AWS
        run: |
          aws configure set aws_access_key_id ${{ secrets.ACCESS_KEY_2 }}
          aws configure set aws_secret_access_key ${{ secrets.SECRET_ACCESS_KEY_2 }}
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 563364226105.dkr.ecr.ap-south-1.amazonaws.com

      - name: build docker 
        run: |
          docker build -t salary-predction .
      - name: docker tag
        run: |
          docker tag salary-predction:latest 563364226105.dkr.ecr.ap-south-1.amazonaws.com/salary-predction:latest
      - name: push to ecr
        run: |
          docker push 563364226105.dkr.ecr.ap-south-1.amazonaws.com/salary-predction:latest
      
      - name: Deployment to EC2
        if: success()

        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws configure set aws_access_key_id ${{ secrets.ACCESS_KEY_2 }}
            aws configure set aws_secret_access_key ${{ secrets.SECRET_ACCESS_KEY_2 }}
            aws configure set default.region ap-south-1

            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 563364226105.dkr.ecr.ap-south-1.amazonaws.com
            docker pull 563364226105.dkr.ecr.ap-south-1.amazonaws.com/salary-predction:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 5000:8000 --name my-app 563364226105.dkr.ecr.ap-south-1.amazonaws.com/salary-predction:latest






































